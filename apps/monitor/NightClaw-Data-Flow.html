<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>NightClaw · Data Flow</title>
<meta name="viewport" content="width=device-width,initial-scale=1">
<style>
  :root {
    --bg:#0f0f0e; --surface:#161614; --surface-2:#1c1b19; --surface-3:#222120;
    --border:rgba(255,255,255,0.08); --border-hi:rgba(255,255,255,0.14);
    --text:#c8c6c2; --text-muted:#6e6c69; --text-faint:#3a3937;
    --accent:#3d9e8c; --accent-hi:#4fb8a3; --accent-dim:rgba(61,158,140,0.15);
    --ok:#4a9e5c; --warn:#c8893a; --err:#b85b5b;
    --font-mono: ui-monospace, SFMono-Regular, "SF Mono", Menlo, Consolas, "Liberation Mono", monospace;
    --trace: #5ec7ff;
    --trace-dim: rgba(94,199,255,0.18);
  }
  [data-theme="light"] {
    --bg:#f5f4f0; --surface:#ffffff; --surface-2:#f9f8f5; --surface-3:#f0ede8;
    --border:rgba(0,0,0,0.09); --border-hi:rgba(0,0,0,0.15);
    --text:#1e1c19; --text-muted:#7a7874; --text-faint:#bab8b4;
    --accent:#0a7a6a; --accent-hi:#0d9a84; --accent-dim:rgba(10,122,106,0.1);
    --ok:#2d7a3a; --warn:#a06820; --err:#943030;
    --trace:#0a7a9a; --trace-dim:rgba(10,122,154,0.14);
  }
  html, body { margin:0; padding:0; height:100%; background:var(--bg); color:var(--text);
    font-family:var(--font-mono); font-size:11px; line-height:1.4; overflow:hidden; }
  #stage { width:100%; height:100%; display:block; }
  .band-label { fill:var(--text-muted); font-size:9.5px; letter-spacing:.12em; text-transform:uppercase; font-weight:600; }
  .title-label { fill:var(--text-muted); font-size:10px; letter-spacing:.14em; text-transform:uppercase; font-weight:600; }
  .run-label { fill:var(--text-faint); font-size:9.5px; letter-spacing:.08em; }

  /* Node base */
  .node rect.node-bg {
    fill: var(--surface-2);
    stroke: var(--border-hi);
    stroke-width: 1;
    rx: 3; ry: 3;
    transition: fill .25s, stroke .25s, filter .25s;
  }
  .node text.node-title { fill: var(--text); font-size:10.5px; font-weight:600; letter-spacing:.02em; }
  .node text.node-sub   { fill: var(--text-muted); font-size:9.5px; letter-spacing:.01em; }
  .node circle.status-dot { fill: var(--text-faint); r:2.6; }

  /* Active node (current step) — highlighted */
  .node.active rect.node-bg {
    fill: var(--accent-dim);
    stroke: var(--accent-hi);
    stroke-width: 1.4;
    filter: drop-shadow(0 0 8px rgba(79, 184, 163, 0.25));
  }
  .node.active text.node-title { fill: var(--accent-hi); }
  .node.active circle.status-dot { fill: var(--accent-hi); r:3.2; }

  /* Edges */
  .edge {
    stroke: var(--border-hi);
    stroke-width: 1;
    fill: none;
    opacity: 0.55;
  }
  .edge.trace-on {
    stroke: var(--trace);
    stroke-width: 1.6;
    opacity: 0.95;
    filter: drop-shadow(0 0 4px rgba(94, 199, 255, 0.4));
    stroke-dasharray: 4 3;
    animation: dashmove 1.2s linear infinite;
  }
  @keyframes dashmove { to { stroke-dashoffset: -14; } }
  .arrowhead { fill: var(--border-hi); }
  .arrowhead.trace { fill: var(--trace); }

  /* Legend */
  .legend-box { fill: var(--surface); stroke: var(--border); rx:3; ry:3; }
  .legend-text { fill: var(--text-muted); font-size:9.5px; letter-spacing:.02em; }
  .legend-dot.active { fill: var(--accent-hi); }
  .legend-dot.flow   { fill: var(--trace); }
  .legend-dot.live   { fill: var(--ok); }

  /* Clickable nodes */
  .node.has-file { cursor: pointer; }
  .node.has-file rect.node-bg { stroke: var(--border-hi); }
  .node.has-file:hover rect.node-bg {
    fill: var(--surface-3);
    stroke: var(--accent);
  }
  .node.has-file text.node-title { text-decoration: underline; text-decoration-color: var(--accent-dim); }

  /* File viewer overlay */
  #file-viewer {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.6);
    z-index: 100;
    align-items: center;
    justify-content: center;
  }
  #file-viewer.open { display: flex; }
  #file-viewer-box {
    background: var(--surface);
    border: 1px solid var(--border-hi);
    border-radius: 6px;
    width: min(860px, 92vw);
    max-height: 80vh;
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }
  #file-viewer-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 8px 14px;
    border-bottom: 1px solid var(--border);
    background: var(--surface-2);
  }
  #file-viewer-title {
    font-size: 11px;
    font-weight: 600;
    color: var(--accent-hi);
    letter-spacing: .04em;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }
  #file-viewer-close {
    background: none;
    border: 1px solid var(--border-hi);
    border-radius: 3px;
    color: var(--text-muted);
    font-size: 11px;
    cursor: pointer;
    padding: 2px 8px;
    flex-shrink: 0;
  }
  #file-viewer-close:hover { color: var(--text); border-color: var(--accent); }
  #file-viewer-body {
    overflow: auto;
    padding: 14px 16px;
    flex: 1;
    white-space: pre-wrap;
    font-size: 10.5px;
    line-height: 1.6;
    color: var(--text);
  }
  #file-viewer-body.loading { color: var(--text-muted); font-style: italic; }
  #file-viewer-body.error   { color: var(--err); white-space: pre-wrap; }
  #file-viewer-body.md h1,#file-viewer-body.md h2,#file-viewer-body.md h3 {
    color: var(--accent-hi); font-size: 13px; margin: 12px 0 4px; letter-spacing:.03em; }
  #file-viewer-body.md h4,#file-viewer-body.md h5 { color: var(--text); font-size:11px; margin:8px 0 2px; }
  #file-viewer-body.md p  { margin: 4px 0 8px; }
  #file-viewer-body.md code { background: var(--surface-3); padding: 1px 4px;
    border-radius:2px; font-size:10px; }
  #file-viewer-body.md pre { background: var(--surface-3); padding: 10px 12px;
    border-radius:4px; overflow-x:auto; margin: 6px 0; }
  #file-viewer-body.md pre code { background:none; padding:0; }
  #file-viewer-body.md ul,#file-viewer-body.md ol { padding-left:18px; margin:4px 0; }
  #file-viewer-body.md li { margin: 2px 0; }
  #file-viewer-body.md hr { border:none; border-top:1px solid var(--border); margin:10px 0; }
  #file-viewer-body.md a  { color: var(--accent-hi); }
  #file-viewer-body.md blockquote { border-left:3px solid var(--accent-dim);
    margin:6px 0; padding:4px 10px; color:var(--text-muted); }
  #file-viewer-body.md strong { color: var(--text); }
</style>
</head>

    'hardlines':          { file: 'orchestration-os/CRON-HARDLINES.md',          label: 'CRON-HARDLINES.md' },
    'preapproval':        { file: 'orchestration-os/OPS-PREAPPROVAL.md',         label: 'OPS-PREAPPROVAL.md' },
    'active-projects':    { file: 'ACTIVE-PROJECTS.md',                          label: 'ACTIVE-PROJECTS.md' },
    'longrunner':         { file: 'orchestration-os/LONGRUNNER-TEMPLATE.md',     label: 'LONGRUNNER-TEMPLATE.md' },
    'idle-cycle':         { file: 'orchestration-os/OPS-IDLE-CYCLE.md',          label: 'OPS-IDLE-CYCLE.md' },
    'tool-status':        { file: 'orchestration-os/TOOL-STATUS.md',             label: 'TOOL-STATUS.md' },
    'project-outputs':    { file: 'PROJECTS/MANAGER-REVIEW-REGISTRY.md',         label: 'MANAGER-REVIEW-REGISTRY.md' },
    'quality-standard':   { file: 'orchestration-os/OPS-QUALITY-STANDARD.md',   label: 'OPS-QUALITY-STANDARD.md' },
    'notifications':      { file: 'NOTIFICATIONS.md',                            label: 'NOTIFICATIONS.md' },
    'failure-modes':      { file: 'orchestration-os/OPS-FAILURE-MODES.md',       label: 'OPS-FAILURE-MODES.md' },
    'audit-log':          { file: 'audit/AUDIT-LOG.md',                          label: 'AUDIT-LOG.md' },
    'session-reg':        { file: 'audit/SESSION-REGISTRY.md',                   label: 'SESSION-REGISTRY.md' },
    'change-log':         { file: 'audit/CHANGE-LOG.md',                         label: 'CHANGE-LOG.md' },
    'memory-daily':       { file: 'memory/README.md',                            label: 'memory/' },
    'lessons':            { file: 'AGENTS-LESSONS.md',                           label: 'AGENTS-LESSONS.md' },
    'knowledge':          { file: 'orchestration-os/OPS-KNOWLEDGE-EXECUTION.md', label: 'OPS-KNOWLEDGE-EXECUTION.md' },
    'manager-review-reg': { file: 'PROJECTS/MANAGER-REVIEW-REGISTRY.md',         label: 'MANAGER-REVIEW-REGISTRY.md' },
    'ops-py':             { file: 'orchestration-os/START-HERE.md',              label: 'START-HERE.md' },
  };

  // ── File viewer ───────────────────────────────────────────────────────────
  // Try direct HTTP fetch from bridge first; fall back to postMessage chain.
  // Renders markdown via marked.js when available.

  function getBridgeBase() {
    // When served from HTTP monitor, window.location.port is the bridge HTTP port.
    if (window.location.protocol === 'http:' && window.location.port) {
      return 'http://' + window.location.hostname + ':' + window.location.port;
    }
    // Try to read from parent's bridgePort variable (same-origin parent).
    try {
      if (window.parent && window.parent !== window && window.parent.bridgePort) {
        return 'http://127.0.0.1:' + window.parent.bridgePort;
      }
    } catch (_) {}
    return null;
  }

  function renderMarkdown(text) {
    if (typeof marked !== 'undefined') {
      try { return marked.parse(text); } catch (_) {}
    }
    // Fallback: plain pre-wrap
    const div = document.createElement('div');
    div.style.whiteSpace = 'pre-wrap';
    div.textContent = text;
    return div.outerHTML;
  }

  function openNodeFile(nid) {
    const entry = NODE_FILES[nid];
    if (!entry) return;
    const viewer = document.getElementById('file-viewer');
    const body   = document.getElementById('file-viewer-body');
    const title  = document.getElementById('file-viewer-title');
    title.textContent = entry.label;
    body.innerHTML = '';
    body.className = 'loading';
    body.textContent = 'Loading…';
    viewer.classList.add('open');

    const base = getBridgeBase();
    if (base) {
      // Direct HTTP fetch — works whenever the bridge HTTP server is running.
      fetch(base + '/api/file?path=' + encodeURIComponent(entry.file))
        .then(r => {
          if (!r.ok) throw new Error('HTTP ' + r.status);
          return r.text();
        })
        .then(text => {
          body.className = 'md';
          body.innerHTML = renderMarkdown(text);
        })
        .catch(err => {
          // Fall back to postMessage chain (bridge WebSocket path)
          const sent = sendFileRequestViaParent(entry.file, entry.label);
          if (!sent) {
            body.textContent = 'Bridge not reachable. Start the monitor bridge to view files.\n\nFile: ' + entry.file;
            body.className = 'error';
          }
        });
    } else {
      // file:// context — use postMessage chain
      const sent = sendFileRequestViaParent(entry.file, entry.label);
      if (!sent) {
        body.textContent = 'Open via the NightClaw monitor to view file contents.\n\nFile: ' + entry.file;
        body.className = 'error';
      }
    }
  }

  function sendFileRequestViaParent(file, label) {
    if (!window.parent || window.parent === window) return false;
    try {
      window.parent.postMessage({ type: 'nc-open-file', file, label }, '*');
      return true;
    } catch (_) { return false; }
  }

  function closeFileViewer() {
    document.getElementById('file-viewer').classList.remove('open');
  }

  document.getElementById('file-viewer').addEventListener('click', e => {
    if (e.target === document.getElementById('file-viewer')) closeFileViewer();
  });
  document.addEventListener('keydown', e => {
    if (e.key === 'Escape') closeFileViewer();
  });

  // ── Step highlight logic ──────────────────────────────────────────────────
  const STEP_NODES = {
    // startup: lock acquire, integrity check, read hardlines + registry
    startup: ['ops-py','integrity','check-lock','lock','hardlines','registry'],
    // T0: checkpoint write to audit-log only
    T0:      ['ops-py','audit-log'],
    // T1: dispatch (active-projects); if IDLE → idle-cycle → notifications
    T1:      ['ops-py','active-projects','idle-cycle','notifications'],
    // T2: longrunner-extract; T2.5 six-frame; T2.7 preapproval→approval-chain; escalation→notifications
    T2:      ['ops-py','longrunner','active-projects','notifications','preapproval','approval-chain'],
    // T3: tool-status check only
    T3:      ['ops-py','tool-status'],
    // T4: execute pass — writes project-outputs, audit-log, change-log; reads longrunner
    T4:      ['ops-py','longrunner','audit-log','project-outputs','change-log'],
    // T5: validate against longrunner criteria; T5.5 quality-standard; may write notifications
    T5:      ['ops-py','longrunner','quality-standard','notifications'],
    // T6: stop-condition eval; longrunner_update bundle; phase_transition → active-projects + notifications
    T6:      ['ops-py','longrunner','active-projects','audit-log','notifications'],
    // T7: OS improvement — tool/knowledge/failure/lessons/quality/memory writes; t7-dedup gate
    T7:      ['ops-py','failure-modes','lessons','knowledge','tool-status','memory-daily'],
    // T8: manager only — audit-spine, anomaly scan, scr-verify, notifications pruning, manager-review-reg
    T8:      ['ops-py','audit-log','registry','notifications','manager-review-reg'],
    // T9: session_close bundle — session-reg, memory-daily, audit-log; release lock
    T9:      ['ops-py','session-reg','memory-daily','lock','audit-log'],
  };

  const STEP_EDGES = {
    startup: ['e-registry-ops','e-lock-ops','e-integrity-ops','e-checklock-ops','e-hardlines-ops'],
    T0:      ['e-toolstatus-auditlog'],
    T1:      ['e-ops-activeproj','e-idle-notif'],
    T2:      ['e-ops-activeproj','e-activeproj-longrunner','e-activeproj-notif','e-approvalchain-preap','e-preap-activeproj'],
    T3:      ['e-ops-toolstatus'],
    T4:      ['e-longrunner-projout','e-projout-changelog','e-toolstatus-auditlog'],
    T5:      ['e-longrunner-quality','e-activeproj-notif'],
    T6:      ['e-ops-activeproj','e-activeproj-longrunner','e-activeproj-notif'],
    T7:      ['e-ops-failuremodes','e-failmodes-lessons','e-lessons-knowledge','e-notif-memory'],
    T8:      ['e-registry-ops','e-activeproj-notif','e-toolstatus-auditlog','e-mgrreview-activeproj'],
    T9:      ['e-lock-ops','e-auditlog-sessionreg'],
  };

  function clearState() {
    document.querySelectorAll('.node.active').forEach(n => n.classList.remove('active'));
    document.querySelectorAll('.edge.trace-on').forEach(e => {
      e.classList.remove('trace-on');
      e.setAttribute('marker-end','url(#ah-default)');
    });
  }

  function applyHighlight(step, nodes) {
    clearState();
    const effective = nodes && nodes.length ? nodes : (STEP_NODES[step] || []);
    effective.forEach(nid => {
      const el = document.getElementById('n-' + nid);
      if (el) el.classList.add('active');
    });
    (STEP_EDGES[step] || []).forEach(eid => {
      const e = document.getElementById(eid);
      if (e) {
        e.classList.add('trace-on');
        e.setAttribute('marker-end','url(#ah-trace)');
      }
    });
  }

  function applyTheme(theme) {
    document.body.setAttribute('data-theme', theme === 'light' ? 'light' : 'dark');
  }

  // ── Message bus ──────────────────────────────────────────────────────────
  window.addEventListener('message', (ev) => {
    const d = ev.data || {};
    if (d.type === 'nc-highlight') {
      applyHighlight(d.step, d.nodes);
      if (d.run) document.getElementById('run-label').textContent = d.run;
    } else if (d.type === 'nc-theme') {
      applyTheme(d.theme);
    } else if (d.type === 'nc-file-content') {
      // Response from parent postMessage chain (fallback path)
      const body = document.getElementById('file-viewer-body');
      const title = document.getElementById('file-viewer-title');
      if (d.label) title.textContent = d.label;
      const text = d.content ?? d.output ?? '';
      if (d.ok && text) {
        body.className = 'md';
        body.innerHTML = renderMarkdown(text);
      } else {
        body.textContent = d.error || text || 'Unable to load file.';
        body.className = 'error';
      }
    }
  });

  // ── Init ─────────────────────────────────────────────
  Object.keys(NODE_FILES).forEach(nid => {
    const el = document.getElementById('n-' + nid);
    if (!el) return;
    el.classList.add('has-file');
    el.style.cursor = 'pointer';
    el.addEventListener('click', () => openNodeFile(nid));
  });

</script>
</body>
