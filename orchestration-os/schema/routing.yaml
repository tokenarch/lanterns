# R3 — WRITE ROUTING
# File → tier → bundle. Sole authority for "how does a write to this file happen?"
# Tiers: APPEND | STANDARD | PROTECTED | MANIFEST-VERIFY | CODE
# CODE tier: source files change-gated by the test suite, not by bundles. Added in Pass 5
# for the four Python packages (nightclaw_engine, nightclaw_bridge, nightclaw_monitor,
# nightclaw_ops) and apps/monitor UI assets. bundle="-" always for CODE.
# Sourced from orchestration-os/REGISTRY.md R3 (pre-Merge-1 content).

routes:
  - { file: "ACTIVE-PROJECTS.md(update)",                   tier: STANDARD,        bundle: "BUNDLE:longrunner_update",   note: "T6 state sync after pass" }
  - { file: "ACTIVE-PROJECTS.md(block)",                    tier: STANDARD,        bundle: "BUNDLE:route_block",         note: "T2/T2.7/T3 blocking" }
  - { file: "ACTIVE-PROJECTS.md(transition)",               tier: STANDARD,        bundle: "BUNDLE:phase_transition",    note: "Phase complete" }
  - { file: "ACTIVE-PROJECTS.md(advance)",                  tier: STANDARD,        bundle: "BUNDLE:phase_advance",       note: "Phase advance to successor" }
  - { file: "ACTIVE-PROJECTS.md(escalation)",               tier: STANDARD,        bundle: "BUNDLE:surface_escalation",  note: "Surfacing to {OWNER}" }
  - { file: "ACTIVE-PROJECTS.md",                           tier: STANDARD,        bundle: "standalone",                 note: "Canonical bare name; see suffixed rows above for bundle-specific routing" }
  - { file: "PROJECTS/*/LONGRUNNER.md",                     tier: STANDARD,        bundle: "BUNDLE:longrunner_update",   note: "Always via bundle, never raw" }
  - { file: "PROJECTS/*/LONGRUNNER-DRAFT.md",               tier: STANDARD,        bundle: "standalone",                 note: "Worker idle-cycle Tier 4 writes; manager T3.5 reads; {OWNER} renames to LONGRUNNER.md on approval" }
  - { file: "PROJECTS/*/outputs/*",                         tier: STANDARD,        bundle: "standalone",                 note: "T4 only. NEVER overwrite files from a prior phase — use phase-namespaced filenames. Prior phase outputs are audit artifacts." }
  - { file: "NOTIFICATIONS.md(append)",                     tier: APPEND,          bundle: "standalone",                 note: "Manager appends at STARTUP/T0/T2/T3.5/T4/T8; worker via BUNDLE:surface_escalation" }
  - { file: "NOTIFICATIONS.md(prune)",                      tier: STANDARD,        bundle: "standalone",                 note: "Manager T8.3 only — move resolved/stale entries to archive" }
  - { file: "NOTIFICATIONS.md",                             tier: APPEND,          bundle: "standalone",                 note: "Canonical bare name; see suffixed rows above for bundle-specific routing" }
  - { file: "NOTIFICATIONS-ARCHIVE.md",                     tier: APPEND,          bundle: "standalone",                 note: "Manager T8.3 only — receives pruned entries verbatim" }
  - { file: "audit/AUDIT-LOG.md",                           tier: APPEND,          bundle: "inline",                     note: "Every step writes its own entry" }
  - { file: "audit/SESSION-REGISTRY.md",                    tier: APPEND,          bundle: "BUNDLE:session_close",       note: "T9 only" }
  - { file: "audit/CHANGE-LOG.md",                          tier: APPEND,          bundle: "inline",                     note: "Immediately after each field change in T4" }
  - { file: "audit/APPROVAL-CHAIN.md",                      tier: APPEND,          bundle: "BUNDLE:pa_invoke",           note: "T2.7 only" }
  - { file: "audit/INTEGRITY-MANIFEST.md",                  tier: MANIFEST-VERIFY, bundle: "BUNDLE:manifest_verify",     note: "Manager: timestamps only. {OWNER}: hashes." }
  - { file: "memory/YYYY-MM-DD.md",                         tier: APPEND,          bundle: "BUNDLE:session_close,inline", note: "T9 via bundle; manager T3/T3.5 inline one-liners; worker idle-cycle inline" }
  - { file: "memory/README.md",                             tier: STANDARD,        bundle: "standalone",                 note: "Explains empty fresh-template daily-log directory versus protected MEMORY.md." }
  - { file: "PROJECTS/MANAGER-REVIEW-REGISTRY.md",          tier: STANDARD,        bundle: "standalone",                 note: "Manager T7 only" }
  - { file: "orchestration-os/OPS-TOOL-REGISTRY.md",        tier: STANDARD,        bundle: "standalone",                 note: "Worker T7a only" }
  - { file: "AGENTS.md",                                    tier: STANDARD,        bundle: "standalone",                 note: "Navigation index — read by the cron prompt at T0. {OWNER} edits only. Do not write behavioral content here." }
  - { file: "MODEL-TIERS.md",                               tier: STANDARD,        bundle: "standalone",                 note: "{OWNER} edits only. Never written by the agent. Read by set-model-tier at T9 to resolve model ID for next session." }
  - { file: "AGENTS-CORE.md",                               tier: PROTECTED,       bundle: "none",                       note: "{OWNER} only. Contains session contracts and behavioral rules. Re-sign after any edit." }
  - { file: "AGENTS-LESSONS.md",                            tier: APPEND,          bundle: "standalone",                 note: "Worker T7d only — append behavior lessons. Never overwrite." }
  - { file: "LOCK.md",                                      tier: STANDARD,        bundle: "standalone",                 note: "Worker/manager STARTUP (write) and BUNDLE:session_close (release). Overwrite-in-place only." }
  - { file: "orchestration-os/REGISTRY.md(append)",         tier: STANDARD,        bundle: "standalone",                 note: "Worker T7f — append new rows only. Never modify existing rows, never delete." }
  - { file: "orchestration-os/REGISTRY.md(structural)",     tier: PROTECTED,       bundle: "none",                       note: "Any modification to existing rows, deletion, or section restructuring. {OWNER} only. Re-sign after." }
  - { file: "orchestration-os/OPS-FAILURE-MODES.md",        tier: STANDARD,        bundle: "standalone",                 note: "Worker T7c — NEVER delete entries" }
  - { file: "orchestration-os/OPS-QUALITY-STANDARD.md",     tier: STANDARD,        bundle: "standalone",                 note: "Worker T7e" }
  - { file: "orchestration-os/OPS-KNOWLEDGE-EXECUTION.md",  tier: STANDARD,        bundle: "standalone",                 note: "Worker T7b" }
  - { file: "SOUL.md",                                      tier: PROTECTED,       bundle: "none",                       note: "{OWNER} only. Six-frame review." }
  - { file: "USER.md",                                      tier: PROTECTED,       bundle: "none",                       note: "{OWNER} only." }
  - { file: "IDENTITY.md",                                  tier: PROTECTED,       bundle: "none",                       note: "{OWNER} only." }
  - { file: "MEMORY.md",                                    tier: PROTECTED,       bundle: "none",                       note: "{OWNER} only." }
  - { file: "orchestration-os/CRON-WORKER-PROMPT.md",       tier: PROTECTED,       bundle: "none",                       note: "{OWNER} only. Re-sign after." }
  - { file: "orchestration-os/CRON-MANAGER-PROMPT.md",      tier: PROTECTED,       bundle: "none",                       note: "{OWNER} only. Re-sign after." }
  - { file: "orchestration-os/OPS-PREAPPROVAL.md",          tier: PROTECTED,       bundle: "none",                       note: "{OWNER} only. Re-sign after." }
  - { file: "orchestration-os/OPS-AUTONOMOUS-SAFETY.md",    tier: PROTECTED,       bundle: "none",                       note: "{OWNER} only. Re-sign after." }
  - { file: "orchestration-os/CRON-HARDLINES.md",           tier: PROTECTED,       bundle: "none",                       note: "{OWNER} only. Re-sign after." }

